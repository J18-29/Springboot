<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pokédex Spring Boot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pokemon.css}">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-success mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/pokemon">POKEAPI</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/pokemon}">Home</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Generaciones
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                        <li><a class="dropdown-item" th:href="@{/generacion/1}">Primera Generación</a></li>
                        <li><a class="dropdown-item" th:href="@{/generacion/2}">Segunda Generación</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/generacion/3}">Tercera Generación</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container text-center">
    <h1 class="mb-4">Pokédex Spring Boot</h1>

    <div class="row g-3"> <div class="col-md-2" th:each="pokemon : ${pokemons}">
            <div class="card h-100 shadow-sm"> <img th:src="${pokemon.imagen}" class="card-img-top" alt="pokemon">
                <div class="card-body d-flex flex-column">
                    <p class="card-text">
                        <span th:text="${pokemon.numero}"></span> - <span th:text="${pokemon.nombre}"></span>
                    </p>
                    <a th:href="@{/pokemon/{id}(id=${pokemon.numero})}" class="btn btn-primary mt-auto">
                        Ver detalle
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
